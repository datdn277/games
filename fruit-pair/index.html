<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ghép cặp để tìm bên nhiều hơn</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" aria-hidden="true"></canvas>

      <div class="sr-only" aria-live="polite" aria-atomic="true">
        <p id="instruction">
          Kéo từng quả Táo ghép với từng quả Cam. Nhìn phần còn dư để hiểu bên nào nhiều hơn, ít hơn hoặc bằng nhau.
        </p>
      </div>

      <div class="ui-layer">
        <section class="panel answer-panel" aria-label="Chọn đáp án">
          <button class="answer-btn" type="button" data-answer="left-more">Trái nhiều hơn</button>
          <button class="answer-btn" type="button" data-answer="equal">Bằng nhau</button>
          <button class="answer-btn" type="button" data-answer="right-more">Phải nhiều hơn</button>
        </section>

        <section class="panel controls-panel">
          <label class="toggle-pill" for="teach-toggle">
            <input id="teach-toggle" type="checkbox" />
            <span>Hướng dẫn chi tiết</span>
          </label>
          <button id="hint-btn" type="button">Gợi ý</button>
          <button id="reset-btn" class="ghost" type="button">Chơi lại</button>
        </section>
      </div>

      <div class="sr-only" aria-live="polite" aria-atomic="true" id="announcement"></div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
