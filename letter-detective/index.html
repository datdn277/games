<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Thám tử chữ cái - MVP</title>
  <style>
    :root {
      --bg1: #fff7d6;
      --bg2: #d9f4ff;
      --panel: rgba(255, 255, 255, 0.82);
      --ink: #253047;
      --muted: #667085;
      --primary: #5f6cff;
      --primary-dark: #3f4bea;
      --success: #22b573;
      --warning: #ffb020;
      --danger: #ff5d6c;
      --shadow: 0 18px 45px rgba(48, 60, 120, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: ui-rounded, "SF Pro Rounded", "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,0.95), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(255,205,105,0.40), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(126,220,255,0.46), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    #app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 18px 22px 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .badge {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(145deg, #fff, #f1efff);
      box-shadow: var(--shadow);
      font-size: 30px;
    }

    h1 {
      margin: 0;
      line-height: 1.05;
      font-size: clamp(24px, 4vw, 42px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 4px;
      font-weight: 700;
      color: var(--muted);
      font-size: clamp(13px, 1.8vw, 17px);
    }

    .score-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      font-weight: 900;
      white-space: nowrap;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: #ffffff;
      color: #4b5565;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.04);
    }

    #sceneWrap {
      position: relative;
      overflow: hidden;
    }

    canvas.three {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: manipulation;
      cursor: pointer;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .bottom-panel {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      padding: 10px 22px 18px;
    }

    .controls, .level-box, .toggle-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .controls { justify-content: center; }
    .toggle-box { justify-content: flex-end; }

    button, select, label.toggle {
      border: 0;
      outline: none;
      border-radius: 18px;
      min-height: 48px;
      padding: 0 17px;
      font: inherit;
      font-weight: 1000;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 10px 24px rgba(52, 63, 112, 0.15), inset 0 -3px 0 rgba(0,0,0,0.05);
      backdrop-filter: blur(14px);
    }

    button {
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(1px) scale(0.98); }
    button.primary {
      color: white;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
    }
    button.success {
      color: white;
      background: linear-gradient(145deg, #2ed188, #159c68);
    }
    button.warning {
      color: #442600;
      background: linear-gradient(145deg, #ffd46b, #ffac2b);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    select {
      appearance: none;
      cursor: pointer;
      padding-right: 34px;
      background-image:
        linear-gradient(45deg, transparent 50%, #5a6478 50%),
        linear-gradient(135deg, #5a6478 50%, transparent 50%);
      background-position: calc(100% - 20px) 20px, calc(100% - 14px) 20px;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
    }

    label.toggle {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      user-select: none;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 94px;
      z-index: 4;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      max-width: min(720px, calc(100% - 32px));
      padding: 15px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.94);
      box-shadow: var(--shadow);
      font-weight: 1000;
      text-align: center;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.good { color: #0c7c52; }
    .toast.bad { color: #c23846; }
    .toast.info { color: #3d4be0; }

    @media (max-width: 820px) {
      .topbar {
        padding: 12px 14px 6px;
        align-items: flex-start;
      }
      .score-card { gap: 6px; padding: 10px; font-size: 13px; }
      .pill { padding: 6px 9px; }
      .badge { width: 46px; height: 46px; font-size: 26px; border-radius: 16px; }
      .bottom-panel {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px 12px 12px;
      }
      .level-box, .controls, .toggle-box { justify-content: center; }
      button, select, label.toggle { min-height: 44px; border-radius: 15px; padding: 0 13px; font-size: 14px; }
      .toast { bottom: 168px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="badge">🔎</div>
        <div>
          <h1>Thám tử chữ cái</h1>
          <div class="subtitle">Tìm chữ khác trong nhóm chữ tiếng Việt</div>
        </div>
      </div>
      <div class="score-card" aria-label="Điểm chơi">
        <span class="pill">Đúng: <span id="correctCount">0</span></span>
        <span class="pill">Sai: <span id="wrongCount">0</span></span>
      </div>
    </header>

    <main id="sceneWrap">
      <p id="instruction" class="sr-only" aria-live="polite">Bạn thám tử ơi, hãy tìm chữ khác trong nhóm!</p>
      <p id="hintLine" class="sr-only">Quan sát hình dạng từng chữ, rồi chạm vào chữ không giống các chữ còn lại.</p>
      <div id="toast" class="toast"></div>
    </main>

    <footer class="bottom-panel">
      <div class="level-box">
        <select id="levelSelect" aria-label="Chọn độ khó">
          <option value="easy">Dễ: chữ Việt khác rõ</option>
          <option value="similar">Trung bình: chữ Việt gần giống</option>
          <option value="vietnamese">Dấu chữ Việt: Ă Â Đ Ê Ô Ơ Ư</option>
          <option value="mixed">Ngẫu nhiên chữ Việt</option>
        </select>
      </div>
      <div class="controls">
        <button id="speakBtn" class="primary">🔊 Đọc câu hỏi</button>
        <button id="hintBtn" class="warning">💡 Gợi ý</button>
        <button id="nextBtn" class="success">🔄 Chơi lại</button>
      </div>
      <div class="toggle-box">
        <label class="toggle">
          <input id="detailedToggle" type="checkbox" />
          Hướng dẫn chi tiết
        </label>
      </div>
    </footer>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const sceneWrap = document.getElementById('sceneWrap');
    const instructionEl = document.getElementById('instruction');
    const hintLineEl = document.getElementById('hintLine');
    const toastEl = document.getElementById('toast');
    const correctCountEl = document.getElementById('correctCount');
    const wrongCountEl = document.getElementById('wrongCount');
    const levelSelect = document.getElementById('levelSelect');
    const detailedToggle = document.getElementById('detailedToggle');
    const hintBtn = document.getElementById('hintBtn');
    const nextBtn = document.getElementById('nextBtn');
    const speakBtn = document.getElementById('speakBtn');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(sceneWrap.clientWidth, sceneWrap.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.className = 'three';
    sceneWrap.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-7, 7, 4.2, -4.2, 0.1, 100);
    camera.position.set(0, -0.6, 14);
    camera.lookAt(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.92);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.75);
    keyLight.position.set(5, 8, 10);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.left = -8;
    keyLight.shadow.camera.right = 8;
    keyLight.shadow.camera.top = 6;
    keyLight.shadow.camera.bottom = -6;
    scene.add(keyLight);

    const fillLight = new THREE.PointLight(0xbdefff, 1.5, 30);
    fillLight.position.set(-5, -4, 8);
    scene.add(fillLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(16, 10),
      new THREE.ShadowMaterial({ opacity: 0.13 })
    );
    floor.position.set(0, 0.0, -0.35);
    floor.receiveShadow = true;
    scene.add(floor);

    const root = new THREE.Group();
    root.rotation.x = -0.10;
    scene.add(root);

    const sparkleRoot = new THREE.Group();
    scene.add(sparkleRoot);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();
    const tweens = [];

    // Bảng chữ cái tiếng Việt dùng trong game:
    // A Ă Â B C D Đ E Ê G H I K L M N O Ô Ơ P Q R S T U Ư V X Y
    // Không dùng các chữ không thuộc bảng chữ cái tiếng Việt như F, J, W, Z.
    const easyPairs = [
      ['A', 'B'], ['C', 'G'], ['D', 'Đ'], ['H', 'N'], ['I', 'T'], ['K', 'L'],
      ['M', 'N'], ['P', 'Q'], ['R', 'S'], ['U', 'V'], ['X', 'Y'], ['O', 'Ơ']
    ];

    const similarPairs = [
      ['O', 'Ô'], ['O', 'Ơ'], ['U', 'Ư'], ['A', 'Ă'], ['A', 'Â'], ['E', 'Ê'],
      ['D', 'Đ'], ['C', 'G'], ['M', 'N'], ['P', 'R'], ['b', 'd'], ['p', 'q'],
      ['m', 'n'], ['u', 'ư'], ['o', 'ơ'], ['a', 'ă'], ['e', 'ê'], ['d', 'đ']
    ];

    const vietnamesePairs = [
      ['a', 'ă'], ['a', 'â'], ['ă', 'â'], ['o', 'ô'], ['o', 'ơ'], ['ô', 'ơ'],
      ['u', 'ư'], ['e', 'ê'], ['d', 'đ'], ['A', 'Ă'], ['A', 'Â'], ['Ă', 'Â'],
      ['O', 'Ô'], ['O', 'Ơ'], ['Ô', 'Ơ'], ['U', 'Ư'], ['E', 'Ê'], ['D', 'Đ']
    ];

    let game = {
      level: 'easy',
      mainLetter: 'A',
      oddLetter: 'B',
      oddIndex: 0,
      tiles: [],
      clickable: [],
      locked: false,
      answered: false,
      correct: 0,
      wrong: 0,
      round: 1
    };

    function choosePairs(level) {
      if (level === 'easy') return easyPairs;
      if (level === 'similar') return similarPairs;
      if (level === 'vietnamese') return vietnamesePairs;
      return [...easyPairs, ...similarPairs, ...vietnamesePairs];
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      const clone = arr.slice();
      for (let i = clone.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }
      return clone;
    }

    function setInstruction(text, subText = '') {
      instructionEl.textContent = text;
      hintLineEl.textContent = subText;
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'vi-VN';
      utter.rate = 0.88;
      utter.pitch = 1.15;
      const voices = window.speechSynthesis.getVoices();
      const viVoice = voices.find(v => v.lang?.toLowerCase().startsWith('vi')) || voices.find(v => v.name?.toLowerCase().includes('vietnam'));
      if (viVoice) utter.voice = viVoice;
      window.speechSynthesis.speak(utter);
    }

    function showToast(message, type = 'info', duration = 2400) {
      toastEl.textContent = message;
      toastEl.className = `toast show ${type}`;
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toastEl.className = `toast ${type}`;
      }, duration);
    }

    function createTextTexture(text, options = {}) {
      const {
        fontSize = 180,
        color = '#273047',
        stroke = '#ffffff',
        strokeWidth = 14,
        width = 512,
        height = 384,
        shadow = false
      } = options;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, width, height);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `1000 ${fontSize}px Arial, Helvetica, sans-serif`;
      if (shadow) {
        ctx.shadowColor = 'rgba(24, 33, 80, 0.18)';
        ctx.shadowBlur = 18;
        ctx.shadowOffsetY = 8;
      }
      ctx.lineWidth = strokeWidth;
      ctx.strokeStyle = stroke;
      ctx.strokeText(text, width / 2, height / 2 + 4);
      ctx.fillStyle = color;
      ctx.fillText(text, width / 2, height / 2 + 4);
      const texture = new THREE.CanvasTexture(canvas);
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      texture.needsUpdate = true;
      return texture;
    }

    function roundedBoxMaterial(index, isOdd) {
      const palette = [0xfffaf2, 0xf2f6ff, 0xf3fff6, 0xfff2fb, 0xf8f5ff, 0xf0fcff, 0xffffef, 0xf2fff9, 0xfff5ef];
      const color = palette[index % palette.length];
      return new THREE.MeshStandardMaterial({
        color,
        roughness: 0.55,
        metalness: 0.04,
        emissive: isOdd ? 0x000000 : 0x000000,
        emissiveIntensity: 0
      });
    }

    function createTile(letter, index, isOdd, position) {
      const group = new THREE.Group();
      group.position.copy(position);
      group.userData.basePosition = position.clone();
      group.userData.index = index;
      group.userData.isOdd = isOdd;
      group.userData.letter = letter;

      const baseGeo = new THREE.BoxGeometry(1.72, 1.24, 0.28, 4, 4, 1);
      const baseMat = roundedBoxMaterial(index, isOdd);
      const base = new THREE.Mesh(baseGeo, baseMat);
      base.castShadow = true;
      base.receiveShadow = true;
      base.userData.tileIndex = index;
      group.add(base);

      const rimGeo = new THREE.BoxGeometry(1.86, 1.38, 0.08, 4, 4, 1);
      const rimMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.45,
        transparent: true,
        opacity: 0.95
      });
      const rim = new THREE.Mesh(rimGeo, rimMat);
      rim.position.z = -0.12;
      rim.castShadow = true;
      group.add(rim);

      const texture = createTextTexture(letter, {
        fontSize: letter.length > 1 ? 136 : 188,
        color: '#273047',
        shadow: false
      });
      const textMat = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });
      const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.42, 1.02), textMat);
      textPlane.position.z = 0.18;
      textPlane.userData.tileIndex = index;
      group.add(textPlane);

      const haloMat = new THREE.MeshBasicMaterial({
        color: 0x7d8cff,
        transparent: true,
        opacity: 0,
        depthWrite: false
      });
      const halo = new THREE.Mesh(new THREE.PlaneGeometry(2.08, 1.58), haloMat);
      halo.position.z = -0.16;
      group.add(halo);

      const tile = { index, letter, isOdd, group, base, textPlane, halo, baseMat, textTexture: texture };
      group.userData.tile = tile;
      base.userData.tile = tile;
      textPlane.userData.tile = tile;
      return tile;
    }

    function disposeObject(obj) {
      obj.traverse((child) => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          materials.forEach((m) => {
            if (m.map) m.map.dispose();
            m.dispose();
          });
        }
      });
    }

    function clearBoard() {
      game.tiles.forEach(t => {
        root.remove(t.group);
        disposeObject(t.group);
      });
      game.tiles = [];
      game.clickable = [];
      while (sparkleRoot.children.length) {
        const child = sparkleRoot.children.pop();
        disposeObject(child);
      }
      tweens.length = 0;
    }

    function makePositions() {
      const positions = [];
      const gapX = 2.1;
      const gapY = 1.52;
      const yOffset = -0.38;
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 3; col++) {
          positions.push(new THREE.Vector3((col - 1) * gapX, (1 - row) * gapY + yOffset, 0));
        }
      }
      return positions;
    }

    function newRound() {
      clearBoard();
      game.level = levelSelect.value;
      const pair = pickRandom(choosePairs(game.level));
      const swap = Math.random() < 0.45;
      game.mainLetter = swap ? pair[1] : pair[0];
      game.oddLetter = swap ? pair[0] : pair[1];
      game.oddIndex = Math.floor(Math.random() * 9);
      game.locked = false;
      game.answered = false;
      game.round += 1;

      const positions = makePositions();
      for (let i = 0; i < 9; i++) {
        const isOdd = i === game.oddIndex;
        const tile = createTile(isOdd ? game.oddLetter : game.mainLetter, i, isOdd, positions[i]);
        game.tiles.push(tile);
        game.clickable.push(tile.base, tile.textPlane);
        root.add(tile.group);
        tile.group.scale.setScalar(0.05);
        tween(tile.group.scale, 520 + i * 35, (t) => {
          const s = easeOutBack(t);
          tile.group.scale.setScalar(s);
        });
      }

      setInstruction('Bạn thám tử ơi, hãy tìm chữ khác trong nhóm chữ tiếng Việt!', 'Chạm vào ô có chữ không giống các ô còn lại.');
      showToast('Màn mới đã sẵn sàng. Tất cả đều là chữ cái tiếng Việt nhé!', 'info', 1900);
    }

    function tween(target, duration, onUpdate, onDone) {
      tweens.push({ target, duration, elapsed: 0, onUpdate, onDone });
    }

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeOutBack(t) {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function flashTile(tile, color = 0x7687ff, duration = 700) {
      const oldColor = tile.baseMat.color.clone();
      tile.halo.material.color.setHex(color);
      tween(tile.group, duration, (t) => {
        const wave = Math.sin(t * Math.PI);
        tile.halo.material.opacity = 0.45 * wave;
        tile.baseMat.emissive.setHex(color);
        tile.baseMat.emissiveIntensity = 0.42 * wave;
        const s = 1 + 0.09 * wave;
        tile.group.scale.setScalar(s);
      }, () => {
        tile.baseMat.emissiveIntensity = 0;
        tile.baseMat.color.copy(oldColor);
        tile.halo.material.opacity = 0;
        tile.group.scale.setScalar(1);
      });
    }

    function markCorrect(tile) {
      game.locked = true;
      tile.halo.material.color.setHex(0x22c978);
      tile.halo.material.opacity = 0.58;
      tile.baseMat.emissive.setHex(0x22c978);
      tile.baseMat.emissiveIntensity = 0.34;
      tween(tile.group, 900, (t) => {
        const s = 1 + 0.14 * Math.sin(t * Math.PI * 2);
        tile.group.scale.setScalar(s);
      }, () => {
        tile.group.scale.setScalar(1.08);
      });
      createSparkles(tile.group.position, 0x22c978);
    }

    function shakeTile(tile) {
      const baseX = tile.group.userData.basePosition.x;
      const baseRot = tile.group.rotation.z;
      tile.halo.material.color.setHex(0xff5d6c);
      tween(tile.group, 520, (t) => {
        const wave = Math.sin(t * Math.PI * 9);
        tile.group.position.x = baseX + wave * 0.12 * (1 - t);
        tile.group.rotation.z = baseRot + wave * 0.055 * (1 - t);
        tile.halo.material.opacity = 0.35 * Math.sin(t * Math.PI);
        tile.baseMat.emissive.setHex(0xff5d6c);
        tile.baseMat.emissiveIntensity = 0.35 * Math.sin(t * Math.PI);
      }, () => {
        tile.group.position.x = baseX;
        tile.group.rotation.z = baseRot;
        tile.halo.material.opacity = 0;
        tile.baseMat.emissiveIntensity = 0;
      });
    }

    function createSparkles(center, color) {
      for (let i = 0; i < 24; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.045 + Math.random() * 0.035, 10, 10),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
        );
        mesh.position.copy(center).add(new THREE.Vector3(0, 0, 0.45));
        sparkleRoot.add(mesh);
        const angle = Math.random() * Math.PI * 2;
        const radius = 0.7 + Math.random() * 1.2;
        const target = center.clone().add(new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle) * radius, 0.6 + Math.random() * 0.45));
        tween(mesh, 820 + Math.random() * 240, (t) => {
          const e = easeOutCubic(t);
          mesh.position.lerpVectors(center.clone().add(new THREE.Vector3(0, 0, 0.45)), target, e);
          mesh.material.opacity = 1 - t;
          mesh.scale.setScalar(1 + t * 1.3);
        }, () => {
          sparkleRoot.remove(mesh);
          disposeObject(mesh);
        });
      }
    }

    function explainCorrect() {
      return `Đúng rồi! Chữ ${game.oddLetter} khác nhóm. Các chữ còn lại là chữ ${game.mainLetter}.`;
    }

    function explainWrong(selectedLetter) {
      return `Chưa đúng. Chữ ${selectedLetter} giống nhóm chính. Hãy tìm chữ khác với các chữ ${game.mainLetter}.`;
    }

    function selectTile(tile) {
      if (game.locked || game.answered) return;
      if (tile.isOdd) {
        game.answered = true;
        game.correct += 1;
        correctCountEl.textContent = String(game.correct);
        markCorrect(tile);
        const msg = explainCorrect();
        setInstruction(msg, 'Chữ khác được tách ra khỏi nhóm giống nhau.');
        showToast(msg, 'good', 3500);
        speak(msg);
      } else {
        game.wrong += 1;
        wrongCountEl.textContent = String(game.wrong);
        shakeTile(tile);
        const msg = explainWrong(tile.letter);
        setInstruction('Chưa đúng, thử quan sát lại nhé!', `Ô con chọn vẫn là chữ ${game.mainLetter}.`);
        showToast(msg, 'bad', 3100);
        speak('Chưa đúng. Chữ này giống nhóm chính. Con hãy tìm chữ khác nhóm nhé.');
      }
    }

    function handlePointerDown(event) {
      if (game.locked) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(game.clickable, false);
      if (!hits.length) return;
      const tile = hits[0].object.userData.tile;
      if (tile) selectTile(tile);
    }

    function normalHint() {
      if (game.locked || game.answered) return;
      setInstruction('Hãy tìm ô không giống các ô còn lại.', `Nhóm chính là chữ ${game.mainLetter}. Có một chữ khác đang lẩn trong nhóm.`);
      speak(`Nhóm chính là chữ ${game.mainLetter}. Hãy tìm chữ khác nhóm.`);
      game.tiles.forEach((tile, idx) => {
        setTimeout(() => flashTile(tile, tile.isOdd ? 0xffb020 : 0x7d8cff, 420), idx * 70);
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function detailedGuide() {
      if (game.locked || game.answered) return;
      game.locked = true;
      setInstruction('Ta sẽ quan sát từng ô nhé.', `Các chữ giống nhau tạo thành nhóm chữ ${game.mainLetter}.`);
      speak(`Ta sẽ quan sát từng ô nhé. Các chữ giống nhau tạo thành nhóm chữ ${game.mainLetter}.`);
      await sleep(1200);

      const order = shuffle([...Array(9).keys()]);
      for (const index of order) {
        const tile = game.tiles[index];
        if (tile.isOdd) {
          setInstruction(`Ô này là chữ ${tile.letter}.`, `Chữ này khác với nhóm chữ ${game.mainLetter}.`);
          flashTile(tile, 0xffb020, 850);
          speak(`Ô này là chữ ${tile.letter}. Chữ này khác với nhóm.`);
          await sleep(1000);
        } else {
          setInstruction(`Ô này là chữ ${tile.letter}.`, `Chữ này giống nhóm chính.`);
          flashTile(tile, 0x7d8cff, 580);
          await sleep(470);
        }
      }

      const oddTile = game.tiles[game.oddIndex];
      setInstruction(`Con hãy chọn chữ ${game.oddLetter}.`, `Vì chỉ chữ ${game.oddLetter} khác nhóm chữ ${game.mainLetter}.`);
      flashTile(oddTile, 0xffb020, 1300);
      speak(`Con hãy chọn chữ ${game.oddLetter}. Vì chỉ chữ này khác nhóm.`);
      await sleep(1200);
      game.locked = false;
    }

    function runHint() {
      if (detailedToggle.checked) detailedGuide();
      else normalHint();
    }

    function resize() {
      const w = sceneWrap.clientWidth;
      const h = sceneWrap.clientHeight;
      renderer.setSize(w, h);
      const aspect = w / Math.max(h, 1);
      const viewH = w < 820 ? 8.8 : 7.6;
      const viewW = viewH * aspect;
      camera.left = -viewW / 2;
      camera.right = viewW / 2;
      camera.top = viewH / 2;
      camera.bottom = -viewH / 2;
      camera.updateProjectionMatrix();
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta() * 1000;
      for (let i = tweens.length - 1; i >= 0; i--) {
        const tw = tweens[i];
        tw.elapsed += delta;
        const t = Math.min(1, tw.elapsed / tw.duration);
        tw.onUpdate(t);
        if (t >= 1) {
          tweens.splice(i, 1);
          tw.onDone?.();
        }
      }
      root.children.forEach((child, idx) => {
        child.rotation.y = Math.sin(performance.now() * 0.0012 + idx) * 0.015;
      });
      renderer.render(scene, camera);
    }

    renderer.domElement.addEventListener('pointerdown', handlePointerDown);
    window.addEventListener('resize', resize);
    levelSelect.addEventListener('change', newRound);
    nextBtn.addEventListener('click', () => {
      window.speechSynthesis?.cancel();
      newRound();
    });
    hintBtn.addEventListener('click', runHint);
    speakBtn.addEventListener('click', () => speak('Bạn thám tử ơi, hãy tìm chữ khác trong nhóm chữ tiếng Việt. Chạm vào ô có chữ không giống các ô còn lại.'));

    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    resize();
    newRound();
    animate();
  </script>
</body>
</html>
