<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Điền số còn thiếu</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>

      <div class="sr-only" aria-live="polite" aria-atomic="true">
        <p id="instruction">Mỗi nhóm cần đủ các số từ 1 đến 6. Tìm số còn thiếu rồi kéo vào ô trống.</p>
      </div>

      <section class="hud top-right">
        <div class="score-line"><span>Số câu đúng</span><strong id="score">0</strong></div>
        <div class="score-line"><span>Lượt sai</span><strong id="mistake">0</strong></div>
      </section>

      <section class="hud bottom-center">
        <label class="toggle-pill" for="teach-toggle">
          <input id="teach-toggle" type="checkbox" />
          <span>Hướng dẫn chi tiết</span>
        </label>
        <button id="hint-btn">Gợi ý</button>
        <button id="reset-btn" class="ghost">Chơi lại</button>
      </section>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
